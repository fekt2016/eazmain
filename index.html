  <!-- Responsiveness QA: runs only on localhost (dev); no console output in production -->
  <script>
    (function () {
      var isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      if (!isDev) return;
      window.addEventListener('load', function () {
        setTimeout(function () {
          var getSelector = function (el) {
            if (el.id) return '#' + el.id;
            if (el.className && typeof el.className === 'string') return '.' + el.className.trim().replace(/\s+/g, '.');
            return el.tagName.toLowerCase();
          };
          var viewport = window.innerWidth;
          var viewportType = viewport <= 767 ? 'Mobile' : viewport <= 1023 ? 'Tablet' : 'Desktop';
          var overflowCount = 0;
          var list = document.querySelectorAll('*');
          for (var i = 0; i < list.length; i++) {
            var el = list[i];
            if (el === document.documentElement || el === document.body) continue;
            if (el.offsetWidth > document.documentElement.clientWidth) {
              overflowCount++;
              el.style.outline = '2px solid red';
            }
          }
          if (typeof console !== 'undefined' && console.group) {
            console.group('Responsiveness QA (' + viewportType + ': ' + viewport + 'px)');
            if (overflowCount === 0) console.log('No layout overflows detected.');
            else console.warn(overflowCount + ' overflow(s) detected.');
            console.groupEnd();
          }
        }, 3000);
      });
    })();
  </script>
